name: Build and Push Docker Image (Backend)

on:
  push:
    branches: [ main ]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/akkercheval/ws-bccmusic-api
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # === Update gitops repo with new image (using the sha- tag) ===
      - name: Update GitOps repo with new backend image
        if: github.ref == 'refs/heads/main'
        run: |
          # Clone the gitops repo (clean every time)
          rm -rf gitops
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/akkercheval/bccmusic-gitops.git gitops
          cd gitops

          # Use the exact sha- tag that the metadata action already created
          SHA_TAG="sha-${{ github.sha }}"
          echo "Updating deployment with image tag: ${SHA_TAG}"

          # Replace any existing image line for this service
          sed -i "s|image: ghcr.io/akkercheval/ws-bccmusic-api:.*|image: ghcr.io/akkercheval/ws-bccmusic-api:${SHA_TAG}|g" \
            apps/ws-bccmusic-api/deployment.yaml

          # Optional: Add a comment to make it obvious this was auto-updated (helps with debugging)
          sed -i '/imagePullPolicy: Always/a \            # Auto-updated by CI on ${{ github.sha }} (build #${{ github.run_number }})' \
            apps/ws-bccmusic-api/deployment.yaml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add apps/ws-bccmusic-api/deployment.yaml
          git commit -m "chore: update backend image to ${SHA_TAG} (build #${{ github.run_number }})" || echo "No changes to commit"
          git push origin main