name: Build and Push Docker Image (Backend)

on:
  push:
    branches: [ main ]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/akkercheval/ws-bccmusic-api
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update gitops repo with new SHA
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          repository: akkercheval/bccmusic-gitops
          token: ${{ secrets.GITOPS_PAT }}   # You'll need to create this secret
          path: gitops

      - name: Update deployment.yaml with new SHA
        if: github.ref == 'refs/heads/main'
        run: |
          cd gitops
          SHA=${{ steps.meta.outputs.version }}   # This is the full SHA
          sed -i "s|image: ghcr.io/akkercheval/ws-bccmusic-api:.*|image: ghcr.io/akkercheval/ws-bccmusic-api:${SHA}|g" apps/ws-bccmusic-api/deployment.yaml
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add apps/ws-bccmusic-api/deployment.yaml
          git commit -m "Update backend image to SHA ${SHA}" || echo "No changes to commit"
          git push