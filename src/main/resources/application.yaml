spring:
  application:
    name: ws-bccmusic-api
    namespace: ws-bccmusic-api
  datasource:
    url: jdbc:sqlserver://192.168.0.10:1433;database=BCCMusic;encrypt=true;trustServerCertificate=true;
    username: ${SPRING_DATASOURCE_USERNAME:wsbccmusicapi}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size=10
      minimum-idle=5
      idle-timeout=300000
      connection-timeout=20000
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false 
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
  security:
    password:
      bcrypt-strength=12
logging:
  level:
    org:
      springframework:
        security: DEBUG
        web: DEBUG	  